<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syllabus & Courses - Shakespeare Ideal School</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div id="header-placeholder"></div>

  <div id="page-content"></div>

  <div id="footer-placeholder"></div>

  <script src="/js/components.js"></script>
  <script src="/js/main.js"></script>
 
  
  <script>
    fetch('/api/syllabus')
      .then(res => res.json())
      .then(data => {
  
        document.getElementById('page-content').innerHTML = `
          ${School.renderPageHero(
            'Academics',
            'Syllabus &amp; Courses'
          )}
  
          <div class="syllabus-container">
  
            ${data.map(s => `
              <div class="card syllabus-card">
  
                <div class="syllabus-grid">
  
                  <div>
  
                    <p class="tag">
                      Classes
                    </p>
  
                    <h3>
                      ${s.classes}
                    </h3>
  
                    <p>
                      <strong>Board:</strong>
                      ${s.board}
                    </p>
  
                  </div>
  
                  <div class="syllabus-subjects-box">
  
                    <p>
                      <strong>Core Subjects</strong>
                    </p>
  
                    <div class="syllabus-subject-tags">
  
                      ${s.subjects
                        .split(',')
                        .map(sub => `
                          <span class="tag">
                            ${sub.trim()}
                          </span>
                        `)
                        .join('')}
  
                    </div>
  
                  </div>
  
                </div>
  
                <div class="syllabus-extra-box">
  
                  <p>
                    <strong>
                      Extra Curricular Activities
                    </strong>
                  </p>
  
                  <p>
                    ${s.extra}
                  </p>
  
                </div>
  
              </div>
            `).join('')}
  
          </div>
        `;
      })
      .catch(err => {
        console.error(err);
  
        document.getElementById('page-content').innerHTML =
          School.renderError();
      });
  </script>
</body>
</html>
