<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achievements — Admin Panel — Shakespeare Ideal School</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<aside class="sidebar" id="sidebarEl"></aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">🏆 Achievements</div>
    <div class="topbar-meta">
      <a href="/achievements.html" class="view-site-btn" target="_blank">View Live Site →</a>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<div id="toast"></div>

<script src="/js/admin-shared.js"></script>
<script>
let state = { achievements: { heroTag: '', heroTitle: '', categories: [] } };

document.getElementById('sidebarEl').innerHTML = buildSidebar('pages', 'achievements');

async function init() {
  state.achievements = await apiGet('/api/data/achievements').catch(() => ({ heroTag: '', heroTitle: '', categories: [] }));
  if (!Array.isArray(state.achievements.categories)) state.achievements.categories = [];
  render();
}

function render() {
  const d    = state.achievements;
  const cats = d.categories;

  document.getElementById('mainContent').innerHTML = `
  <style>
    .ach-section { background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden; }
    .ach-section-header { display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--sidebar-bg,#f8fafc);border-bottom:1px solid var(--border); }
    .ach-section-header-left { display:flex;align-items:center;gap:9px; }
    .ach-section-icon { font-size:17px;line-height:1; }
    .ach-section-title { font-size:13px;font-weight:700;color:var(--text);letter-spacing:.02em;text-transform:uppercase; }
    .ach-section-hint { font-size:11px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0; }
    .ach-section-body { padding:18px; }
    .ach-save-bar { display:flex;gap:10px;padding:20px 0 4px;border-top:1px solid var(--border);margin-top:4px; }
  </style>

  <div class="card" style="padding-bottom:8px;">
    <div class="card-title" style="margin-bottom:20px;">🏆 Achievements — Full Content Editor</div>

    <!-- ① PAGE HERO -->
    <div class="ach-section">
      <div class="ach-section-header">
        <div class="ach-section-header-left">
          <span class="ach-section-icon">🎯</span>
          <span class="ach-section-title">Page Hero</span>
          <span class="ach-section-hint">— top banner of the Achievements page</span>
        </div>
      </div>
      <div class="ach-section-body">
        <div class="form-grid" style="gap:12px;">
          <div class="form-group">
            <label>Hero Tag <span style="font-weight:400;color:var(--muted)">(small label, e.g. "Our Pride")</span></label>
            <input id="ach-heroTag" type="text" value="${esc(d.heroTag || 'Our Pride')}" placeholder="Our Pride">
          </div>
          <div class="form-group">
            <label>Hero Title <span style="font-weight:400;color:var(--muted)">(main h1)</span></label>
            <input id="ach-heroTitle" type="text" value="${esc(d.heroTitle || 'Achievements &amp; Awards')}" placeholder="Achievements &amp; Awards">
          </div>
        </div>
      </div>
    </div>

    <!-- ② ACHIEVEMENT CATEGORIES -->
    <div class="ach-section">
      <div class="ach-section-header">
        <div class="ach-section-header-left">
          <span class="ach-section-icon">🏆</span>
          <span class="ach-section-title">Achievement Categories</span>
          <span class="ach-section-hint">— each card shown on the public page</span>
        </div>
        <button class="btn btn-outline btn-sm" onclick="addAchCat()" style="font-size:12px;padding:5px 12px;">➕ Add Category</button>
      </div>
      <div class="ach-section-body">
        <div id="achList">
          ${cats.map((cat, i) => `
            <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <strong style="font-size:13px;">Category ${i + 1}</strong>
                <button class="btn btn-danger btn-sm" onclick="deleteAchCat(${i})">🗑 Delete</button>
              </div>
              <div class="form-grid" style="gap:10px;margin-bottom:10px;">
                <div class="form-group" style="margin-bottom:0">
                  <label>Category Title</label>
                  <input id="ac-t-${i}" value="${esc(cat.title || '')}">
                </div>
                <div class="form-group" style="margin-bottom:0">
                  <label>Icon <span style="font-weight:400;color:var(--muted)">(emoji, e.g. 🥇)</span></label>
                  <input id="ac-icon-${i}" value="${esc(cat.icon || '')}" placeholder="🥇" style="font-size:20px;width:90px;">
                </div>
              </div>
              <div class="form-group">
                <label>Items <span style="font-weight:400;color:var(--muted)">(one per line)</span></label>
                <textarea id="ac-i-${i}" rows="4">${esc((cat.items || []).join('\n'))}</textarea>
              </div>
            </div>`).join('')}
          ${cats.length === 0 ? `<div class="empty-state"><div class="empty-state-icon">🏆</div><p>No achievement categories yet. Click "Add Category" to start.</p></div>` : ''}
        </div>
      </div>
    </div>

    <!-- SAVE BAR -->
    <div class="ach-save-bar">
      <button class="btn btn-success" onclick="saveAchievements()">💾 Save All Achievements Data</button>
    </div>
  </div>`;
}

window.addAchCat = () => {
  state.achievements.categories.push({ title: '', icon: '', items: [] });
  render();
};

window.deleteAchCat = (index) => {
  state.achievements.categories.splice(index, 1);
  render();
};

window.saveAchievements = async () => {
  const cats = state.achievements.categories.map((_, i) => ({
    title: document.getElementById(`ac-t-${i}`).value.trim(),
    icon:  document.getElementById(`ac-icon-${i}`).value.trim(),
    items: document.getElementById(`ac-i-${i}`).value.split('\n').map(s => s.trim()).filter(Boolean)
  }));

  const updated = {
    ...state.achievements,
    heroTag:    document.getElementById('ach-heroTag').value.trim()   || 'Our Pride',
    heroTitle:  document.getElementById('ach-heroTitle').value.trim() || 'Achievements & Awards',
    categories: cats
  };

  try {
    await api('/api/data/achievements', { method: 'PUT', body: JSON.stringify(updated) });
    state.achievements = updated;
    toast('✅ Achievements saved.');
    render();
  } catch (err) {
    toast('❌ Save failed: ' + err.message, 'error');
  }
};

init();
</script>
</body>
</html>
