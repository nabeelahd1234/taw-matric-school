<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admissions Control — Admin Panel — Shakespeare Ideal School</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<aside class="sidebar" id="sidebarEl"></aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">📋 Admissions Control</div>
    <div class="topbar-meta">
      <a href="/admissions.html" class="view-site-btn" target="_blank">View Live Site →</a>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<div id="toast"></div>

<script src="/js/admin-shared.js"></script>
<script>
let state = { admissions: {} };

document.getElementById('sidebarEl').innerHTML = buildSidebar('pages', 'admissions');

async function init() {
  state.admissions = await apiGet('/api/data/admissions').catch(() => ({}));
  render();
}

function render() {
  const d = state.admissions;
  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-title">📋 Admissions Control</div>
      <div class="form-grid cols-3">
        <div class="form-group">
          <label>Portal Status</label>
          <select id="ad-status">
            <option value="open"   ${d.status === 'open'   ? 'selected' : ''}>🟢 Open</option>
            <option value="closed" ${d.status === 'closed' ? 'selected' : ''}>🔴 Closed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Last Date</label>
          <input id="ad-date" value="${esc(d.lastDate || '')}" placeholder="e.g. 31 March 2025">
        </div>
        <div class="form-group">
          <label>Contact Phone</label>
          <input id="ad-phone" value="${esc(d.contactPhone || '')}" placeholder="e.g. +91 98765 43210">
        </div>
      </div>

      <hr style="margin:20px 0">

      <div class="form-grid">
        <div class="form-group form-full">
          <label>Admissions Notice / Announcement <span style="font-weight:400;color:var(--muted)">(optional short message shown on the admissions page)</span></label>
          <textarea id="ad-notice" rows="3" placeholder="e.g. Admissions open for 2025–26 academic year. Limited seats available.">${esc(d.notice || '')}</textarea>
        </div>
      </div>

      <button class="btn btn-success" onclick="saveAdmissions()">💾 Save Admissions Settings</button>
    </div>`;
}

window.saveAdmissions = async () => {
  const updated = {
    ...state.admissions,
    status:       document.getElementById('ad-status').value,
    lastDate:     document.getElementById('ad-date').value.trim(),
    contactPhone: document.getElementById('ad-phone').value.trim(),
    notice:       document.getElementById('ad-notice').value.trim()
  };
  try {
    await api('/api/data/admissions', { method: 'PUT', body: JSON.stringify(updated) });
    state.admissions = updated;
    toast('Admissions settings saved.');
  } catch (err) {
    toast('Save failed: ' + err.message, 'error');
  }
};

init();
</script>
</body>
</html>
