<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Pages — Admin Panel — Shakespeare Ideal School</title>
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    /* extra inline style if needed */
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar" id="sidebarEl"></aside>

<!-- ── Main ── -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">Home Page</div>
    <div class="topbar-meta">
      <a href="/index.html" class="view-site-btn" target="_blank">View Live Site →</a>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<div id="toast"></div>

<script src="/js/admin-shared.js"></script>
<script>
// ── State ─────────────────────────────────────
let state = { home:{}, about:{}, principal:{}, vision:{}, achievements:{}, admissions:{}, rulesRegulations:{} };
let activeSec = 'home';

// ── Default about data (matching frontend expectations) ──
const DEFAULT_QUICK_FACTS = [
  { label: 'Students',    value: '>1200' },
  { label: 'Teachers',    value: '48' },
  { label: 'Classrooms',  value: '36' },
  { label: 'Labs',        value: '5' },
  { label: 'Library',     value: 'Yes' },
  { label: 'Play Grounds',value: '3' },
  { label: 'Buses',       value: '8 Routes' },
  { label: 'Pass Rate',   value: '100% (2024)' }
];

const DEFAULT_MILESTONES = [
  { year: '2000', title: 'Foundation', description: 'School founded with a vision to provide quality education to rural and semi-urban children.' },
  { year: '2005', title: 'First Batch', description: 'First SSLC batch achieves 98% pass rate, establishing academic credibility.' },
  { year: '2010', title: 'Expansion', description: 'New science block and computer lab added; strength reaches 800 students.' },
  { year: '2015', title: 'Sports Excellence', description: 'State-level cricket and athletics teams formed; multiple district championships.' },
  { year: '2020', title: 'Silver Jubilee', description: '20 years of excellence; 3000+ alumni across India and abroad.' },
  { year: '2024', title: '100% SSLC', description: 'Historic 100% pass with 85% distinction in SSLC Board Examinations.' }
];

const DEFAULT_META_BADGES = [
  { icon: '📍', label: 'Location', value: 'Anna Nagar, Chennai – 600 040' },
  { icon: '🏫', label: 'Type',     value: 'Tamil Nadu Matric Board' },
  { icon: '📅', label: 'Established', value: 'Year 2000' },
  { icon: '👦', label: 'Medium',   value: 'Tamil & English Medium' }
];

// ── Boot ──────────────────────────────────────
document.getElementById('sidebarEl').innerHTML = buildSidebar('pages');

async function init() {
  [state.home, state.about, state.principal, state.vision, state.achievements, state.admissions, state.rulesRegulations] =
    await Promise.all([
      apiGet('/api/data/home').catch(()=>({})),
      apiGet('/api/data/about').catch(()=>({})),
      apiGet('/api/data/principal').catch(()=>({})),
      apiGet('/api/data/vision').catch(()=>({})),
      apiGet('/api/data/achievements').catch(()=>({categories:[]})),
      apiGet('/api/data/admissions').catch(()=>({})),
      apiGet('/api/data/rulesRegulations').catch(()=>({sections:[]})),
    ]);
  
  // ensure about page has required arrays (like rules & regulations flexible structure)
  if (!state.about.content) state.about.content = '';
  if (!state.about.quickFacts || !Array.isArray(state.about.quickFacts) || state.about.quickFacts.length === 0) {
    state.about.quickFacts = DEFAULT_QUICK_FACTS;
  }
  if (!state.about.milestones || !Array.isArray(state.about.milestones) || state.about.milestones.length === 0) {
    state.about.milestones = DEFAULT_MILESTONES;
  }
  if (!state.about.metaBadges || !Array.isArray(state.about.metaBadges) || state.about.metaBadges.length === 0) {
    state.about.metaBadges = DEFAULT_META_BADGES;
  }
  
  switchSection('home');
}

function switchSection(id) {
  activeSec = id;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === id);
  });
  const label = document.querySelector(`.nav-item[data-section="${id}"]`)?.textContent.trim() || id;
  document.getElementById('topbarTitle').textContent = label;
  render(id);
}

function render(id) {
  const c = document.getElementById('mainContent');
  switch(id) {
    case 'home':         renderPageEditor(c,'home');      break;
    case 'about':        renderAboutEditor(c);             break;    // upgraded flexible editor
    case 'principal':    renderPrincipalEditor(c);        break;
    case 'vision':       renderVisionEditor(c);           break;
    case 'achievements': renderAchievementsEditor(c);     break;
    case 'admissions':   renderAdmissionsEditor(c);       break;
    case 'rules-regulations': renderRulesEditor(c);       break;
    default: c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔧</div><p>Section coming soon.</p></div>';
  }
}

// ══════════════════════════════════════════════
// ABOUT PAGE EDITOR — Full CRUD for every field
// Covers: Hero Tag, Hero Title, Section Heading,
//         Main Content, Meta Badges (icon/label/value),
//         Quick Facts (label/value), Timeline Heading,
//         Milestones (year/title/description)
// ══════════════════════════════════════════════
function renderAboutEditor(c) {
  const d  = state.about || {};
  const qf = d.quickFacts  || [];
  const ms = d.milestones  || [];
  const mb = d.metaBadges  || [];

  c.innerHTML = `
  <style>
    /* ── About editor scoped styles ── */
    .ab-section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .ab-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 18px;
      background: var(--sidebar-bg, #f8fafc);
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .ab-section-header-left {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .ab-section-icon {
      font-size: 17px;
      line-height: 1;
    }
    .ab-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .ab-section-hint {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }
    .ab-section-body {
      padding: 18px;
    }
    .ab-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .ab-row:last-child { margin-bottom: 0; }
    .ab-row .form-group { margin-bottom: 0; }
    .ab-row .form-group label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
      display: block;
    }
    .ab-row .form-group input,
    .ab-row .form-group textarea {
      padding: 6px 10px;
      font-size: 13px;
    }
    .ab-del-btn {
      flex-shrink: 0;
      align-self: center;
      background: none;
      border: 1px solid #fca5a5;
      color: #ef4444;
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 14px;
      cursor: pointer;
      transition: background .15s;
      margin-top: 16px;
    }
    .ab-del-btn:hover { background: #fef2f2; }
    .ab-empty {
      text-align: center;
      padding: 18px;
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
    }
    .ab-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      padding: 5px 12px;
    }
    .about-save-bar {
      display: flex;
      gap: 10px;
      padding: 20px 0 4px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .ab-badge-icon-field { width: 70px !important; text-align: center; font-size: 18px !important; }
  </style>

  <div class="card" style="padding-bottom:8px;">
    <div class="card-title" style="margin-bottom:20px;">📄 About Page — Full Content Editor</div>

    <!-- ① PAGE HERO ─────────────────────────────── -->
    <div class="ab-section">
      <div class="ab-section-header">
        <div class="ab-section-header-left">
          <span class="ab-section-icon">🎯</span>
          <span class="ab-section-title">Page Hero</span>
          <span class="ab-section-hint">— displayed at the top of the About page</span>
        </div>
      </div>
      <div class="ab-section-body">
        <div class="form-grid" style="gap:12px;">
          <div class="form-group">
            <label>Hero Tag <span style="font-weight:400;color:var(--muted)">(small label above title, e.g. "Our Story")</span></label>
            <input id="ab-heroTag" type="text" value="${esc(d.heroTag || 'Our Story')}" placeholder="Our Story">
          </div>
          <div class="form-group">
            <label>Hero Title <span style="font-weight:400;color:var(--muted)">(main heading, e.g. "About Our School")</span></label>
            <input id="ab-heroTitle" type="text" value="${esc(d.heroTitle || 'About Our School')}" placeholder="About Our School">
          </div>
        </div>
      </div>
    </div>

    <!-- ② SCHOOL SECTION HEADING ─────────────────── -->
    <div class="ab-section">
      <div class="ab-section-header">
        <div class="ab-section-header-left">
          <span class="ab-section-icon">🏫</span>
          <span class="ab-section-title">Section Heading</span>
          <span class="ab-section-hint">— h2 shown above the description paragraph</span>
        </div>
      </div>
      <div class="ab-section-body">
        <div class="form-group" style="margin-bottom:0">
          <label>School Name / Section Heading</label>
          <input id="ab-sectionHeading" type="text" value="${esc(d.sectionHeading || 'Shakespeare Ideal Matriculation School')}" placeholder="Shakespeare Ideal Matriculation School">
        </div>
      </div>
    </div>

    <!-- ③ MAIN DESCRIPTION ──────────────────────── -->
    <div class="ab-section">
      <div class="ab-section-header">
        <div class="ab-section-header-left">
          <span class="ab-section-icon">📝</span>
          <span class="ab-section-title">About Description</span>
          <span class="ab-section-hint">— main body text on the About page</span>
        </div>
      </div>
      <div class="ab-section-body">
        <div class="form-group" style="margin-bottom:0">
          <label>Content</label>
          <textarea id="ab-content" rows="6">${esc(d.content || '')}</textarea>
        </div>
      </div>
    </div>

    <!-- ④ META BADGES ───────────────────────────── -->
    <div class="ab-section">
      <div class="ab-section-header">
        <div class="ab-section-header-left">
          <span class="ab-section-icon">🏷️</span>
          <span class="ab-section-title">Info Badges</span>
          <span class="ab-section-hint">— Location, Type, Established, Medium cards</span>
        </div>
        <button type="button" class="btn btn-outline btn-sm ab-add-btn" id="addBadgeBtn">➕ Add Badge</button>
      </div>
      <div class="ab-section-body">
        <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:8px;padding:0 2px;">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Icon</span>
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Label</span>
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Value</span>
        </div>
        <div id="badgesContainer">
          ${mb.map((b, i) => renderBadgeRow(b, i)).join('')}
        </div>
        ${mb.length === 0 ? `<div class="ab-empty" id="emptyBadgesMsg">No badges yet. Click "Add Badge" to start.</div>` : ''}
      </div>
    </div>

    <!-- ⑤ QUICK FACTS ───────────────────────────── -->
    <div class="ab-section">
      <div class="ab-section-header">
        <div class="ab-section-header-left">
          <span class="ab-section-icon">📊</span>
          <span class="ab-section-title">Quick Facts Panel</span>
          <span class="ab-section-hint">— key stats shown in the right-side panel</span>
        </div>
        <button type="button" class="btn btn-outline btn-sm ab-add-btn" id="addFactBtn">➕ Add Fact</button>
      </div>
      <div class="ab-section-body">
        <div style="display:grid;grid-template-columns:1fr 1fr 40px;gap:8px;margin-bottom:8px;padding:0 2px;">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Label</span>
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Value</span>
          <span></span>
        </div>
        <div id="quickFactsContainer">
          ${qf.map((f, i) => renderFactRow(f, i)).join('')}
        </div>
        ${qf.length === 0 ? `<div class="ab-empty" id="emptyFactsMsg">No facts yet. Click "Add Fact" to start.</div>` : ''}
      </div>
    </div>

    <!-- ⑥ TIMELINE HEADING ──────────────────────── -->
    <div class="ab-section">
      <div class="ab-section-header">
        <div class="ab-section-header-left">
          <span class="ab-section-icon">📜</span>
          <span class="ab-section-title">Timeline Section Heading</span>
          <span class="ab-section-hint">— h3 above the milestone timeline</span>
        </div>
      </div>
      <div class="ab-section-body">
        <div class="form-group" style="margin-bottom:0">
          <label>Timeline Heading</label>
          <input id="ab-timelineHeading" type="text" value="${esc(d.timelineHeading || 'Our Journey Through the Years')}" placeholder="Our Journey Through the Years">
        </div>
      </div>
    </div>

    <!-- ⑦ MILESTONES ───────────────────────────── -->
    <div class="ab-section">
      <div class="ab-section-header">
        <div class="ab-section-header-left">
          <span class="ab-section-icon">🏆</span>
          <span class="ab-section-title">Milestones</span>
          <span class="ab-section-hint">— timeline entries (year · title · description)</span>
        </div>
        <button type="button" class="btn btn-outline btn-sm ab-add-btn" id="addMilestoneBtn">➕ Add Milestone</button>
      </div>
      <div class="ab-section-body">
        <div style="display:grid;grid-template-columns:90px 1fr 2fr 40px;gap:8px;margin-bottom:8px;padding:0 2px;">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Year</span>
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Title</span>
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Description</span>
          <span></span>
        </div>
        <div id="milestonesContainer">
          ${ms.map((m, i) => renderMilestoneRow(m, i)).join('')}
        </div>
        ${ms.length === 0 ? `<div class="ab-empty" id="emptyMilestonesMsg">No milestones yet. Click "Add Milestone" to start.</div>` : ''}
      </div>
    </div>

    <!-- SAVE BAR ────────────────────────────────── -->
    <div class="about-save-bar">
      <button class="btn btn-success" id="saveAboutBtn">💾 Save All About Page Data</button>
      <button class="btn btn-outline" id="resetAboutBtn" style="background:var(--bg)">↻ Reset to Defaults</button>
    </div>
  </div>`;

  // Wire buttons
  document.getElementById('addBadgeBtn').onclick     = () => abAddRow('badge');
  document.getElementById('addFactBtn').onclick      = () => abAddRow('fact');
  document.getElementById('addMilestoneBtn').onclick = () => abAddRow('milestone');
  document.getElementById('saveAboutBtn').onclick    = saveCompleteAboutPage;
  document.getElementById('resetAboutBtn').onclick   = resetAboutToDefaults;
}

// ── Row renderers ──────────────────────────────────
function renderBadgeRow(b, i) {
  return `<div class="ab-row" style="display:grid;grid-template-columns:70px 1fr 1fr 40px;gap:10px;align-items:center;">
    <div class="form-group"><input type="text" class="mb-icon ab-badge-icon-field" value="${esc(b.icon||'')}" placeholder="📍" style="text-align:center;font-size:18px;padding:5px;"></div>
    <div class="form-group"><input type="text" class="mb-label" value="${esc(b.label||'')}" placeholder="e.g. Location"></div>
    <div class="form-group"><input type="text" class="mb-value" value="${esc(b.value||'')}" placeholder="e.g. Chennai – 600 040"></div>
    <button type="button" class="ab-del-btn" onclick="abRemoveRow(this)" title="Remove">✕</button>
  </div>`;
}

function renderFactRow(f, i) {
  return `<div class="ab-row" style="display:grid;grid-template-columns:1fr 1fr 40px;gap:10px;align-items:center;">
    <div class="form-group"><input type="text" class="qf-label" value="${esc(f.label||'')}" placeholder="e.g. Students"></div>
    <div class="form-group"><input type="text" class="qf-value" value="${esc(f.value||'')}" placeholder="e.g. >1200"></div>
    <button type="button" class="ab-del-btn" onclick="abRemoveRow(this)" title="Remove">✕</button>
  </div>`;
}

function renderMilestoneRow(m, i) {
  return `<div class="ab-row" style="display:grid;grid-template-columns:90px 1fr 2fr 40px;gap:10px;align-items:center;">
    <div class="form-group"><input type="text" class="ms-year" value="${esc(m.year||'')}" placeholder="2024"></div>
    <div class="form-group"><input type="text" class="ms-title" value="${esc(m.title||'')}" placeholder="Milestone title"></div>
    <div class="form-group"><input type="text" class="ms-desc" value="${esc(m.description||'')}" placeholder="Brief description"></div>
    <button type="button" class="ab-del-btn" onclick="abRemoveRow(this)" title="Remove">✕</button>
  </div>`;
}

// ── Add / Remove row helpers ───────────────────────
window.abRemoveRow = function(btn) {
  btn.closest('.ab-row').remove();
};

window.abAddRow = function(type) {
  if (type === 'badge') {
    const c = document.getElementById('badgesContainer');
    c.insertAdjacentHTML('beforeend', renderBadgeRow({}, c.children.length));
    document.getElementById('emptyBadgesMsg') && (document.getElementById('emptyBadgesMsg').style.display = 'none');
  } else if (type === 'fact') {
    const c = document.getElementById('quickFactsContainer');
    c.insertAdjacentHTML('beforeend', renderFactRow({}, c.children.length));
    document.getElementById('emptyFactsMsg') && (document.getElementById('emptyFactsMsg').style.display = 'none');
  } else if (type === 'milestone') {
    const c = document.getElementById('milestonesContainer');
    c.insertAdjacentHTML('beforeend', renderMilestoneRow({}, c.children.length));
    document.getElementById('emptyMilestonesMsg') && (document.getElementById('emptyMilestonesMsg').style.display = 'none');
  }
};

// ── Collect helpers ────────────────────────────────
function collectBadges() {
  return [...document.querySelectorAll('#badgesContainer .ab-row')].map(row => ({
    icon:  row.querySelector('.mb-icon')?.value.trim()  || '',
    label: row.querySelector('.mb-label')?.value.trim() || '',
    value: row.querySelector('.mb-value')?.value.trim() || ''
  })).filter(b => b.label || b.value);
}

function collectFacts() {
  return [...document.querySelectorAll('#quickFactsContainer .ab-row')].map(row => ({
    label: row.querySelector('.qf-label')?.value.trim() || '',
    value: row.querySelector('.qf-value')?.value.trim() || ''
  })).filter(f => f.label || f.value);
}

function collectMilestones() {
  return [...document.querySelectorAll('#milestonesContainer .ab-row')].map(row => ({
    year:        row.querySelector('.ms-year')?.value.trim()  || '',
    title:       row.querySelector('.ms-title')?.value.trim() || '',
    description: row.querySelector('.ms-desc')?.value.trim()  || ''
  })).filter(m => m.year || m.title || m.description);
}

// ── Save ───────────────────────────────────────────
window.saveCompleteAboutPage = async function() {
  const updated = {
    ...state.about,
    heroTag:         document.getElementById('ab-heroTag')?.value.trim()         || '',
    heroTitle:       document.getElementById('ab-heroTitle')?.value.trim()       || '',
    sectionHeading:  document.getElementById('ab-sectionHeading')?.value.trim()  || '',
    content:         document.getElementById('ab-content')?.value.trim()         || '',
    timelineHeading: document.getElementById('ab-timelineHeading')?.value.trim() || '',
    metaBadges:      collectBadges(),
    quickFacts:      collectFacts(),
    milestones:      collectMilestones()
  };
  try {
    await api('/api/data/about', { method: 'PUT', body: JSON.stringify(updated) });
    state.about = updated;
    toast('✅ About page saved successfully.');
    renderAboutEditor(document.getElementById('mainContent'));
  } catch (err) {
    toast('❌ Save failed: ' + err.message);
    console.error(err);
  }
};

// ── Reset to defaults ──────────────────────────────
window.resetAboutToDefaults = async function() {
  const defaultAbout = {
    heroTag:         'Our Story',
    heroTitle:       'About Our School',
    sectionHeading:  'Shakespeare Ideal Matriculation School',
    content:         'Shakespeare Ideal Matriculation School was established in 2000 with the noble vision of providing high-quality education accessible to every child. Located in a serene, pollution-free environment, our school stands as a temple of learning where knowledge meets character. Affiliated to the Tamil Nadu Matriculation Board, we offer education from LKG to Class X with a strong emphasis on academic excellence, co-curricular development, and moral values. Our school is recognized as one of the leading Matric schools in the district. We believe every child is unique and gifted. Our faculty of 48 experienced teachers employs innovative teaching methodologies tailored to nurture each student\'s individual strengths, ensuring no child is left behind.',
    timelineHeading: 'Our Journey Through the Years',
    metaBadges:      JSON.parse(JSON.stringify(DEFAULT_META_BADGES)),
    quickFacts:      JSON.parse(JSON.stringify(DEFAULT_QUICK_FACTS)),
    milestones:      JSON.parse(JSON.stringify(DEFAULT_MILESTONES))
  };
  try {
    await api('/api/data/about', { method: 'PUT', body: JSON.stringify(defaultAbout) });
    state.about = defaultAbout;
    toast('🔄 About page reset to defaults.');
    renderAboutEditor(document.getElementById('mainContent'));
  } catch (err) {
    toast('Reset failed: ' + err.message);
  }
};

// ══════════════════════════════════════════════
// PAGE EDITORS (Home, Principal etc – unchanged)
// ══════════════════════════════════════════════
function renderPageEditor(c, section) {
  const d = state[section] || {};
  if (section === 'home') {
    c.innerHTML = `
      <div class="card">
        <div class="card-title">🏠 Home Page Content</div>
        <div class="form-grid">
          <div class="form-group form-full"><label>Hero Title</label><input id="pe-heroTitle" value="${esc(d.heroTitle||'')}"></div>
          <div class="form-group form-full"><label>Hero Subtitle</label><input id="pe-heroSub" value="${esc(d.heroSubtitle||'')}"></div>
          <div class="form-group form-full"><label>Welcome Section Title</label><input id="pe-welTitle" value="${esc((d.welcome||{}).title||'')}"></div>
          <div class="form-group form-full"><label>Welcome Content</label><textarea id="pe-welContent" rows="4">${esc((d.welcome||{}).content||'')}</textarea></div>
        </div>
        <button class="btn btn-success" onclick="saveHomePage()">💾 Save Home Page</button>
      </div>`;
  } 
}

window.saveHomePage = async () => {
  const updated = {
    ...state.home,

function ppStatRow(s) {
  return `<div class="pp-stat-row">
    <div class="form-group"><input type="text" class="pp-stat-label" value="${esc(s.label||'')}" placeholder="e.g. Experience"></div>
    <div class="form-group"><input type="text" class="pp-stat-value" value="${esc(s.value||'')}" placeholder="e.g. 28 Years"></div>
    <button type="button" class="pp-del-btn" onclick="ppRemoveStat(this)" title="Remove">✕</button>
  </div>`;
}

window.ppAddStat = function() {
  const c = document.getElementById('pp-statsContainer');
  c.insertAdjacentHTML('beforeend', ppStatRow({}));
  const empty = document.getElementById('pp-emptyStats');
  if (empty) empty.style.display = 'none';
};

window.ppRemoveStat = function(btn) {
  btn.closest('.pp-stat-row').remove();
};

window.ppClearPhoto = function() {
  state.principal.photo = '';
  renderPrincipalEditor(document.getElementById('mainContent'));
};

window.savePrincipal = async () => {
  const photoFile = document.getElementById('pp-photo')?.files[0];
  let photo = state.principal.photo || '';
  if (photoFile) {
    const fd = new FormData();
    fd.append('photo', photoFile);
    fd.append('type', 'principal');
    const r = await api('/api/upload/principal', { method: 'POST', body: fd });
    photo = r.photo;
  }

  // collect dynamic stats
  const stats = [...document.querySelectorAll('#pp-statsContainer .pp-stat-row')].map(row => ({
    label: row.querySelector('.pp-stat-label')?.value.trim() || '',
    value: row.querySelector('.pp-stat-value')?.value.trim() || ''
  })).filter(s => s.label || s.value);

  const updated = {
    ...state.principal,
    heroTag:        document.getElementById('pp-heroTag')?.value.trim()     || '',
    heroTitle:      document.getElementById('pp-heroTitle')?.value.trim()   || '',
    name:           document.getElementById('pp-name')?.value.trim()        || '',
    title:          document.getElementById('pp-role')?.value.trim()        || '',
    qualification:  document.getElementById('pp-qual')?.value.trim()        || '',
    avatar:         document.getElementById('pp-avatar')?.value.trim()      || '👩‍🏫',
    messageTag:     document.getElementById('pp-msgTag')?.value.trim()      || '',
    messageHeading: document.getElementById('pp-msgHeading')?.value.trim()  || '',
    message:        document.getElementById('pp-msg')?.value.trim()         || '',
    bio:            document.getElementById('pp-bio')?.value.trim()         || '',
    stats,
    photo
  };
  // keep legacy flat fields in sync for backward compat
  if (stats[0]) updated.experience     = stats.find(s => s.label.toLowerCase().includes('exp'))?.value     || updated.experience     || '';
  if (stats[1]) updated.specialization = stats.find(s => s.label.toLowerCase().includes('spec'))?.value    || updated.specialization || '';
  if (stats[3]) updated.awards         = stats.find(s => s.label.toLowerCase().includes('award'))?.value   || updated.awards         || '';
  try {
    await api('/api/data/principal', { method: 'PUT', body: JSON.stringify(updated) });
    state.principal = updated;
    toast('✅ Principal page saved successfully.');
    renderPrincipalEditor(document.getElementById('mainContent'));
  } catch (err) {
    toast('❌ Save failed: ' + err.message);
    console.error(err);
  }
};

    <!-- ⑤ CORE VALUES CARDS ─────────────────────── -->
    <div class="vm-section">
      <div class="vm-section-header">
        <div class="vm-section-header-left">
          <span class="vm-section-icon">🃏</span>
          <span class="vm-section-title">Core Value Cards</span>
          <span class="vm-section-hint">— each card shown in the values grid (icon · title · description)</span>
        </div>
        <button type="button" class="btn btn-outline btn-sm" id="vm-addValueBtn" style="font-size:12px;padding:5px 12px;">➕ Add Value</button>
      </div>
      <div class="vm-section-body">
        <div class="vm-col-heads">
          <span class="vm-col-head">Icon</span>
          <span class="vm-col-head">Title</span>
          <span class="vm-col-head">Description</span>
          <span></span>
        </div>
        <div id="vm-valuesContainer">
          ${values.map(v => vmValueRow(v)).join('')}
        </div>
        ${values.length === 0 ? `<div class="vm-empty" id="vm-emptyValues">No core values yet. Click "Add Value" to start.</div>` : ''}
      </div>
    </div>

    <!-- SAVE BAR ─────────────────────────────────── -->
    <div class="vm-save-bar">
      <button class="btn btn-success" id="vm-saveBtn">💾 Save All Vision &amp; Mission Data</button>
    </div>
  </div>`;

  document.getElementById('vm-addValueBtn').onclick = vmAddValue;
  document.getElementById('vm-saveBtn').onclick      = saveVision;
}

function vmValueRow(v) {
  return `<div class="vm-value-row">
    <div class="vm-value-row-grid">
      <div class="form-group"><input type="text" class="vm-val-icon vm-icon-input" value="${esc(v.icon||'')}" placeholder="💡"></div>
      <div class="form-group"><input type="text" class="vm-val-title" value="${esc(v.title||'')}" placeholder="e.g. Integrity"></div>
      <div class="form-group"><textarea class="vm-val-desc" rows="2" placeholder="Brief description…">${esc(v.description||'')}</textarea></div>
      <button type="button" class="vm-del-btn" onclick="vmRemoveValue(this)" title="Remove">✕</button>
    </div>
  </div>`;
}

window.vmAddValue = function() {
  const c = document.getElementById('vm-valuesContainer');
  c.insertAdjacentHTML('beforeend', vmValueRow({}));
  const empty = document.getElementById('vm-emptyValues');
  if (empty) empty.style.display = 'none';
};

window.vmRemoveValue = function(btn) {
  btn.closest('.vm-value-row').remove();
};

window.saveVision = async () => {
  const values = [...document.querySelectorAll('#vm-valuesContainer .vm-value-row')].map(row => ({
    icon:        row.querySelector('.vm-val-icon')?.value.trim()  || '',
    title:       row.querySelector('.vm-val-title')?.value.trim() || '',
    description: row.querySelector('.vm-val-desc')?.value.trim()  || ''
  })).filter(v => v.title || v.description);

  const updated = {
    ...state.vision,
    heroTag:            document.getElementById('vm-heroTag')?.value.trim()       || '',
    heroTitle:          document.getElementById('vm-heroTitle')?.value.trim()     || '',
    visionIcon:         document.getElementById('vm-visionIcon')?.value.trim()    || '🔭',
    vision:             document.getElementById('vm-vision')?.value.trim()        || '',
    missionIcon:        document.getElementById('vm-missionIcon')?.value.trim()   || '🎯',
    mission:            document.getElementById('vm-mission')?.value.trim()       || '',
    coreValuesSubtitle: document.getElementById('vm-valuesSubtitle')?.value.trim()|| '',
    coreValuesHeading:  document.getElementById('vm-valuesHeading')?.value.trim() || '',
    values
  };
  try {
    await api('/api/data/vision', { method: 'PUT', body: JSON.stringify(updated) });
    state.vision = updated;
    toast('✅ Vision & Mission saved successfully.');
    renderVisionEditor(document.getElementById('mainContent'));
  } catch (err) {
    toast('❌ Save failed: ' + err.message);
    console.error(err);
  }
};

// ACHIEVEMENTS
function renderAchievementsEditor(c) {
  const d = state.achievements || {};
  const cats = d.categories || [];
  c.innerHTML = `
    <div class="card">
      <div class="card-title">🏆 Achievements</div>
      <div id="achList">
        ${cats.map((cat,i) => `
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px">
            <div class="form-group" style="margin-bottom:10px"><label>Category Title</label><input id="ac-t-${i}" value="${esc(cat.title||'')}"></div>
            <div class="form-group"><label>Items (one per line)</label><textarea id="ac-i-${i}" rows="4">${esc((cat.items||[]).join('\n'))}</textarea></div>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-outline" onclick="addAchCat()">➕ Add Category</button>
        <button class="btn btn-success" onclick="saveAchievements()">💾 Save All</button>
      </div>
    </div>`;
}
window.addAchCat = () => {
  if (!state.achievements.categories) state.achievements.categories = [];
  state.achievements.categories.push({ title:'', items:[] });
  renderAchievementsEditor(document.getElementById('mainContent'));
};
window.saveAchievements = async () => {
  const cats = (state.achievements.categories||[]).map((_,i)=>({
    title: document.getElementById(`ac-t-${i}`).value.trim(),
    items: document.getElementById(`ac-i-${i}`).value.split('\n').map(s=>s.trim()).filter(Boolean)
  }));
  const updated = { ...state.achievements, categories:cats };
  await api('/api/data/achievements', { method:'PUT', body: JSON.stringify(updated) });
  state.achievements = updated;
  toast('Achievements saved.');
};

// ADMISSIONS
function renderAdmissionsEditor(c) {
  const d = state.admissions || {};
  c.innerHTML = `
    <div class="card">
      <div class="card-title">📋 Admissions Control</div>
      <div class="form-grid cols-3">
        <div class="form-group">
          <label>Portal Status</label>
          <select id="ad-status">
            <option value="open" ${d.status==='open'?'selected':''}>🟢 Open</option>
            <option value="closed" ${d.status==='closed'?'selected':''}>🔴 Closed</option>
          </select>
        </div>
        <div class="form-group"><label>Last Date</label><input id="ad-date" value="${esc(d.lastDate||'')}"></div>
        <div class="form-group"><label>Contact Phone</label><input id="ad-phone" value="${esc(d.contactPhone||'')}"></div>
      </div>
      <button class="btn btn-success" onclick="saveAdmissions()">💾 Save Admissions Settings</button>
    </div>`;
}
window.saveAdmissions = async () => {
  const updated = { ...state.admissions, status:document.getElementById('ad-status').value, lastDate:document.getElementById('ad-date').value.trim(), contactPhone:document.getElementById('ad-phone').value.trim() };
  await api('/api/data/admissions', { method:'PUT', body: JSON.stringify(updated) });
  state.admissions = updated;
  toast('Admissions settings saved.');
};

// RULES & REGULATIONS (unchanged, full featured)
function renderRulesEditor(c) {
  const d = state.rulesRegulations || {};
  const sections = d.sections || [];
  c.innerHTML = `
    <div class="card">
      <div class="card-title">📘 Rules & Regulations</div>
      <div class="form-grid">
        <div class="form-group"><label>Hero Title</label><input id="rr-heroTitle" value="${esc(d.heroTitle || '')}"></div>
        <div class="form-group"><label>Hero Subtitle</label><input id="rr-heroSubtitle" value="${esc(d.heroSubtitle || '')}"></div>
        <div class="form-group form-full"><label>Introduction Title</label><input id="rr-introTitle" value="${esc(d.introduction?.title || '')}"></div>
        <div class="form-group form-full"><label>Introduction Description</label><textarea id="rr-introDesc" rows="4">${esc(d.introduction?.description || '')}</textarea></div>
      </div>
      <hr style="margin:24px 0">
      <div id="rulesSections">
        ${sections.map((sec, i) => `
          <div style="background:var(--bg);border:1px solid var(--border);padding:18px;border-radius:var(--radius);margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">Section ${i + 1}</h3><button class="btn btn-danger" onclick="deleteRuleSection(${i})">🗑 Delete</button></div>
            <div class="form-grid">
              <div class="form-group"><label>Title</label><input id="rr-title-${i}" value="${esc(sec.title || '')}"></div>
              <div class="form-group"><label>Icon</label><input id="rr-icon-${i}" value="${esc(sec.icon || '')}"></div>
              <div class="form-group form-full"><label>Rules (One per line)</label><textarea id="rr-rules-${i}" rows="6">${esc((sec.rules || []).join('\n'))}</textarea></div>
            </div>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn btn-outline" onclick="addRuleSection()">➕ Add Section</button>
        <button class="btn btn-success" onclick="saveRulesRegulations()">💾 Save Rules</button>
      </div>
    </div>`;
}
window.addRuleSection = () => {
  if (!state.rulesRegulations.sections) state.rulesRegulations.sections = [];
  state.rulesRegulations.sections.push({ id: Date.now(), title: '', icon: '📘', rules: [] });
  renderRulesEditor(document.getElementById('mainContent'));
};
window.deleteRuleSection = (index) => {
  state.rulesRegulations.sections.splice(index, 1);
  renderRulesEditor(document.getElementById('mainContent'));
};
window.saveRulesRegulations = async () => {
  const sections = (state.rulesRegulations.sections || []).map((sec, i) => ({
    id: sec.id || Date.now(),
    title: document.getElementById(`rr-title-${i}`).value.trim(),
    icon: document.getElementById(`rr-icon-${i}`).value.trim(),
    rules: document.getElementById(`rr-rules-${i}`).value.split('\n').map(r=>r.trim()).filter(Boolean)
  }));
  const updated = { heroTitle: document.getElementById('rr-heroTitle').value.trim(), heroSubtitle: document.getElementById('rr-heroSubtitle').value.trim(), introduction: { title: document.getElementById('rr-introTitle').value.trim(), description: document.getElementById('rr-introDesc').value.trim() }, sections, note: state.rulesRegulations.note || { title: 'Parent Cooperation', description: '' } };
  await api('/api/data/rulesRegulations', { method:'PUT', body: JSON.stringify(updated) });
  state.rulesRegulations = updated;
  toast('Rules & Regulations saved successfully.');
};

// ── Start ──────────────────────────────────────
init();
</script>
</body>
</html>
